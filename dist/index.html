<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Filmes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="https://a.ltrbxd.com/logos/letterboxd-decal-dots-pos-rgb.svg">
  <script type="module" crossorigin src="/assets/main-CdgPRSIy.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/output-Dm48VZ5v.css">
</head>
<body>
   <header style="position: relative;">
        <h1>🎬 Minha Lista de Filmes</h1>
        <p>Filmes assistidos e para assistir (Inspirado no Letterboxd)</p>
        
        <div class="header-actions" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
            <a href="perfil.html" class="profile-btn"><i class="fas fa-user"></i> Meu Perfil</a>
            <button id="logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </header>

    <main>
       <!-- O Formulário original foi mantido aqui -->
       <section id="add-movie">
            <h2>Adicionar Novo Item</h2>
            <form id="movie-form">
                <div style="position: relative;">
                    <input type="text" id="movie-title" placeholder="Digite o Título do Filme para buscar..." autocomplete="off" required>
                    <div id="tmdb-results" class="tmdb-results-container"></div>
                </div>
                
                <input type="text" id="movie-poster-url" placeholder="URL da Capa (Preenchido automaticamente)" readonly required>
                
                <select id="item-type" required>
                    <option value="watched" selected>Filme Assistido (Avaliado)</option>
                    <option value="watchlist">Watchlist (Quero Assistir)</option>
                </select>

                <div id="watched-fields">
                    <select id="movie-rating" required>
                        <option value="" disabled selected>Nota (0.5 a 5 estrelas)</option>
                        <option value="0.5">★☆☆☆☆ (0.5)</option>
                        <option value="1.0">★☆☆☆☆ (1.0)</option>
                        <option value="1.5">★½☆☆☆ (1.5)</option>
                        <option value="2.0">★★☆☆☆ (2.0)</option>
                        <option value="2.5">★★½☆☆ (2.5)</option>
                        <option value="3.0">★★★☆☆ (3.0)</option>
                        <option value="3.5">★★★½☆ (3.5)</option>
                        <option value="4.0">★★★★☆ (4.0)</option>
                        <option value="4.5">★★★★½ (4.5)</option>
                        <option value="5.0">★★★★★ (5.0)</option>
                    </select>
                    <textarea id="movie-review" placeholder="Seu comentário (opcional)"></textarea>
                </div>
                
                <button type="submit">Adicionar à Lista</button>
            </form>
        </section>
        
        <hr>

        <div class="tabs">
            <button class="tab-button active" data-tab="watched">Assistidos</button>
            <button class="tab-button" data-tab="watchlist">Watchlist</button>
        </div>

        <section id="watched-list-section" class="tab-content active">
            <h2>Meus Filmes Assistidos</h2>
            <div id="movie-grid" class="movie-grid">
                </div>
        </section>

        <section id="watchlist-section" class="tab-content">
            <h2>Minha Watchlist</h2>
            <div id="watchlist-container" class="watchlist-container">
                </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Inspired by Letterboxd | Developed by Brunin04</p>
    </footer>

  
    <div id="movie-detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <div class="modal-poster">
                <img id="modal-poster-img" src="" alt="Pôster do Filme">
            </div>
            <div class="modal-details">
                <h2 id="modal-title">Título do Filme</h2>
                <div id="modal-rating" class="movie-rating"></div>
                <p id="modal-review">Aqui vai o comentário completo...</p>
            </div>
        </div>
    </div>


</body>
</html>
